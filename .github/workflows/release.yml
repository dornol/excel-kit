name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew build test --no-daemon

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            # Fallback to git log if version not found in CHANGELOG
            PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
              PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            fi
            BODY=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" | grep -v "^- Merge")
          fi

          {
            echo 'body<<EOF'
            echo "$BODY"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/...${TAG}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
