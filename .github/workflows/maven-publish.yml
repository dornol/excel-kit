name: maven-publish.yml
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: dornol

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Write GPG key to file
        run: |
          mkdir -p ~/.gradle
          echo "${{ secrets.SIGNING_SECRET_KEY }}" | base64 --decode > ~/.gradle/secring.gpg


      - name: Set up gradle.properties
        run: |
          echo "mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}" >> ~/.gradle/gradle.properties
          echo "signing.password=${{ secrets.SIGNING_PASSWORD }}" >> ~/.gradle/gradle.properties
          echo "signing.keyId=${{ secrets.SIGNING_KEYID }}" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=$(echo ~/.gradle/secring.gpg)" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew :kit:build :excel-kit-spring:build --no-daemon

      - name: Publish
        run: |
          ./gradlew :kit:publishAndReleaseToMavenCentral --no-daemon
          ./gradlew :excel-kit-spring:publishAndReleaseToMavenCentral --no-daemon

      - name: Verify Maven Central visibility
        timeout-minutes: 30
        run: |
          scripts/verify-maven-central.sh "${GITHUB_REF_NAME#v}"
          scripts/verify-maven-central.sh "${GITHUB_REF_NAME#v}" --artifact-id excel-kit-spring
