name: maven-publish.yml
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: dornol

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Write GPG key to file
        run: |
          mkdir -p ~/.gradle
          echo "${{ secrets.SIGNING_SECRET_KEY }}" | base64 --decode > ~/.gradle/secring.gpg


      - name: Set up gradle.properties
        run: |
          echo "mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}" >> ~/.gradle/gradle.properties
          echo "signing.password=${{ secrets.SIGNING_PASSWORD }}" >> ~/.gradle/gradle.properties
          echo "signing.keyId=${{ secrets.SIGNING_KEYID }}" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=$(echo ~/.gradle/secring.gpg)" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew :kit:build :kit:test --no-daemon

      - name: Publish
        run: ./gradlew :kit:publishAndReleaseToMavenCentral --no-daemon

      - name: Verify Maven Central visibility
        timeout-minutes: 30
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          POM_URL="https://repo1.maven.org/maven2/io/github/dornol/excel-kit/${VERSION}/excel-kit-${VERSION}.pom"
          METADATA_URL="https://repo1.maven.org/maven2/io/github/dornol/excel-kit/maven-metadata.xml"

          for i in $(seq 1 60); do
            if curl -fsI "$POM_URL" >/dev/null; then
              if curl -fsSL "$METADATA_URL" | grep "<version>${VERSION}</version>"; then
                echo "Maven Central metadata contains ${VERSION}"
              else
                echo "Maven Central POM is visible, but metadata has not caught up yet"
              fi
              echo "Maven Central POM is visible for ${VERSION}"
              exit 0
            fi
            echo "Waiting for Maven Central visibility (${i}/60): ${POM_URL}"
            sleep 30
          done

          echo "Maven Central did not expose ${VERSION} within 30 minutes"
          exit 1
