name: Benchmark

on:
  push:
    branches: [ main ]
    paths:
      - 'kit/src/main/**'
      - 'kit/build.gradle.kts'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run benchmarks
        run: ./gradlew :kit:benchmark --no-daemon

      - name: Save benchmark output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: kit/build/reports/tests/benchmark/
